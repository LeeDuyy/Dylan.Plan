name: Main CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy/app/.next deploy/nginx
          cp -R .next/standalone/. deploy/app/
          cp -R .next/static deploy/app/.next/static
          cp -R public deploy/app/public
          cp compose.yaml deploy/compose.yaml
          cp nginx/default.conf deploy/nginx/default.conf

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylan-plan-runtime
          path: deploy/
          if-no-files-found: error
          include-hidden-files: true

  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 103.72.97.160
      VPS_PORT: 24700
      VPS_PATH: /mnt/SourceCode/DylanPlan

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: dylan-plan-runtime
          path: deploy

      - name: Start ssh-agent
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "${GITHUB_ENV}"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "${GITHUB_ENV}"

          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/askpass.sh <<'EOF'
          #!/bin/sh
          printf '%s\n' "$SSH_PASSPHRASE"
          EOF
          chmod +x ~/.ssh/askpass.sh

          DISPLAY=:0 \
          SSH_ASKPASS="$HOME/.ssh/askpass.sh" \
          SSH_ASKPASS_REQUIRE=force \
          setsid -w ssh-add ~/.ssh/id_ed25519 </dev/null

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare VPS directory
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "${VPS_PORT}" "${{ secrets.VPS_USER }}@${VPS_HOST}" "mkdir -p ${VPS_PATH}"

      - name: Sync runtime artifact to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p ${VPS_PORT}" \
            deploy/ "${{ secrets.VPS_USER }}@${VPS_HOST}:${VPS_PATH}/"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "${VPS_PORT}" "${{ secrets.VPS_USER }}@${VPS_HOST}" "cd ${VPS_PATH} && docker compose up -d --remove-orphans"
